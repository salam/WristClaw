<?xml version="1.0" encoding="UTF-8"?>
<!--
  WristClaw app icon — single source of truth.
  Square 1024 viewbox; iOS/watchOS apply their own corner mask.
  Three claw strokes in the brand purple gradient on bg-void.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <linearGradient id="claw1" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%"  stop-color="#7C6FFF"/>
      <stop offset="100%" stop-color="#A78BFA"/>
    </linearGradient>
    <linearGradient id="claw2" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%"  stop-color="#A78BFA"/>
      <stop offset="100%" stop-color="#C4B5FD"/>
    </linearGradient>
    <linearGradient id="claw3" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%"  stop-color="#C4B5FD"/>
      <stop offset="100%" stop-color="#E8DEFF"/>
    </linearGradient>
    <radialGradient id="bgGlow" cx="50%" cy="60%" r="60%">
      <stop offset="0%"  stop-color="#1A1530"/>
      <stop offset="100%" stop-color="#080810"/>
    </radialGradient>
  </defs>

  <!-- Square background; iOS applies the mask -->
  <rect width="1024" height="1024" fill="url(#bgGlow)"/>

  <!-- Three claw slashes, sweeping diagonally from lower-left to upper-right -->
  <g fill="none" stroke-linecap="round" stroke-linejoin="round">
    <path d="M 240 760 C 220 600 360 450 500 320"
          stroke="url(#claw1)" stroke-width="56"/>
    <path d="M 400 800 C 380 620 520 450 660 280"
          stroke="url(#claw2)" stroke-width="56"/>
    <path d="M 560 800 C 540 640 680 480 800 340"
          stroke="url(#claw3)" stroke-width="48"/>
  </g>
</svg>
