services:
  relay:
    image: ghcr.io/salam/wristclaw-relay:${RELAY_TAG:-latest}
    # To build locally instead: comment out `image` above and uncomment:
    # build: .
    container_name: wristclaw-relay
    ports:
      - "${BIND_ADDR:-0.0.0.0}:${HOST_PORT:-8080}:8080"
    environment:
      PORT: "8080"
      LOG_LEVEL: "${LOG_LEVEL:-info}"
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
