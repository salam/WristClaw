services:
  relay:
    build: .
    # On prod use the published image instead:
    # image: ghcr.io/salam/wristclaw-relay:${RELAY_TAG:-latest}
    container_name: wristclaw-relay
    ports:
      # On objex: set BIND_ADDR=127.0.0.1 in .env so apache reverse-proxies via loopback.
      - "${BIND_ADDR:-0.0.0.0}:${HOST_PORT:-8080}:8080"
    environment:
      PORT: "8080"
      LOG_LEVEL: "${LOG_LEVEL:-info}"
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
