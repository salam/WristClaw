services:
  relay:
    build: .
    container_name: wristclaw-relay
    ports:
      # On objex (shared host) override BIND_ADDR=127.0.0.1 in .env so apache
      # reverse-proxies via loopback. Default 0.0.0.0 is fine for local dev.
      - "${BIND_ADDR:-0.0.0.0}:${HOST_PORT:-8080}:8080"
    environment:
      PORT: "8080"
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
