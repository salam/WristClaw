name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  packages: write
  id-token: write

jobs:
  build:
    name: Build relay binaries
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            suffix: linux-amd64
          - goos: linux
            goarch: arm64
            suffix: linux-arm64
          - goos: darwin
            goarch: amd64
            suffix: darwin-amd64
          - goos: darwin
            goarch: arm64
            suffix: darwin-arm64
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: relay/go.mod
      - name: Build
        working-directory: relay
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: '0'
        run: |
          go build -ldflags="-s -w -X main.version=${{ github.ref_name }}" \
            -o ../relay-${{ matrix.suffix }} ./main.go
      - uses: actions/upload-artifact@v4
        with:
          name: relay-${{ matrix.suffix }}
          path: relay-${{ matrix.suffix }}

  docker:
    name: Build & push Docker image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v5
        with:
          context: relay
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ghcr.io/${{ github.repository_owner }}/wristclaw-relay:${{ github.ref_name }}
            ghcr.io/${{ github.repository_owner }}/wristclaw-relay:latest

  release:
    name: Create GitHub release
    needs: [build, docker]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true
      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: relay-*
          body: |
            ### Docker

            ```sh
            docker pull ghcr.io/salam/wristclaw-relay:${{ github.ref_name }}
            ```

            Or with docker compose (see `relay/docker-compose.yml`):

            ```sh
            RELAY_TAG=${{ github.ref_name }} docker compose up -d
            ```

  publish-skill:
    name: Publish skill to ClawhHub
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install ClawhHub CLI
        run: npm install -g clawhub
      - name: Publish skill
        env:
          CLAWHUB_TOKEN: ${{ secrets.CLAWHUB_TOKEN }}
        run: |
          clawhub skill publish . \
            --slug wristclaw \
            --version ${{ github.ref_name }} \
            --changelog "Release ${{ github.ref_name }}" \
            --json

  publish-plugin:
    name: Publish plugin to ClawhHub + npm
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
      - name: Install ClawhHub CLI
        run: npm install -g clawhub
      - name: Publish to ClawhHub
        env:
          CLAWHUB_TOKEN: ${{ secrets.CLAWHUB_TOKEN }}
        run: |
          clawhub package publish ./plugin \
            --version ${{ github.ref_name }} \
            --json
      - name: Publish to npm
        working-directory: plugin
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          # Stamp the version from the tag (strips leading 'v')
          npm version ${GITHUB_REF_NAME#v} --no-git-tag-version
          npm publish --access public
